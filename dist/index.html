rchent bien plus qu'un simple repas. Ici, chaque instant est pensé pour éveiller les sens.",section1Text2:"Notre philosophie repose sur trois piliers fondamentaux : l'excellence culinaire, l'art de recevoir et la création de moments inoubliables. De notre terrasse panoramique à notre salle aquarium spectaculaire, chaque espace raconte une histoire d'élégance et de raffinement.",section2Title:"L'Excellence",section2Highlight:"Comme Signature.",section2Text1:"Chaque plat qui quitte notre cuisine est le fruit d'une passion inébranlable pour la qualité. Des produits sélectionnés avec soin, des recettes qui allient tradition et modernité, une présentation qui transforme chaque assiette en œuvre d'art.",section2Text2:"L'ENTRACTE est un lieu où le temps s'arrête. Où chaque sourire de notre équipe, chaque détail de notre décor, chaque saveur de nos plats concourt à créer une expérience que l'on n'oublie pas. Un lieu de vie, un lieu de partage, un lieu d'exception."},menuSection:{backgroundVideo:"",backgroundImage:ge.interior2,useVideo:!1,title:"Notre Menu",subtitle:"La Carte",description:"Une carte généreuse et raffinée, du brunch au dîner, des sushis aux grillades — chaque plat est une invitation au voyage culinaire."},reviewsSection:{backgroundVideo:"",backgroundImage:ge.nightCity,useVideo:!1},images:ge,parallaxSections:[{id:j(),image:ge.interiorLighting,quote:"Chaque détail raconte une histoire. Chaque saveur éveille une émotion. Chaque instant devient un souvenir.",author:"L'ENTRACTE"},{id:j(),image:ge.heroAlt,quote:"Là où la gastronomie rencontre l'art de vivre."}],experiences:[{id:j(),icon:"Sun",title:"Grillades & Viandes",description:"Entrecôte, filet de bœuf, mechoui d'agneau — des pièces nobles grillées à la perfection.",image:ge.steak1},{id:j(),icon:"Fish",title:"Sushi & Asiatique",description:"Rolls signature, sashimis, nouilles et poke bowls — un voyage culinaire vers l'Asie.",image:ge.sushi},{id:j(),icon:"Moon",title:"Seafood Boil",description:"Crevettes royale
